<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>RETRO GRAND PRIX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body { margin:0; padding:0; width:100%; height:100%; min-height:100vh; min-height:-webkit-fill-available; overflow:hidden; background:#000; display:flex; justify-content:center; align-items:center; touch-action:none; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
canvas { image-rendering:pixelated; border:none; touch-action:none; display:block; }
</style>
</head>
<body>
<canvas id="c" width="640" height="480"></canvas>
<script>
"use strict";
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// ===== DYNAMIC SIZING =====
function getScreenSize() {
  // visualViewportが最も正確（Safari対応）
  if (window.visualViewport) {
    return { w: window.visualViewport.width, h: window.visualViewport.height };
  }
  return { w: window.innerWidth, h: window.innerHeight };
}

function calcSize() {
  const screen = getScreenSize();
  const ratio = screen.h / screen.w;
  if (ratio > 1.2) {
    return { w: 400, h: Math.floor(400 * ratio) };
  }
  return { w: 640, h: 480 };
}
const size = calcSize();
let W = size.w, H = size.h;
canvas.width = W;
canvas.height = H;

function resizeCanvas() {
  const screen = getScreenSize();
  canvas.style.width = screen.w + "px";
  canvas.style.height = screen.h + "px";
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", resizeCanvas);
}
window.addEventListener("orientationchange", () => setTimeout(resizeCanvas, 200));

// Fullscreen on first touch (mobile)
let fullscreenRequested = false;
document.addEventListener("touchstart", function goFullscreen() {
  if (!fullscreenRequested && document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
    fullscreenRequested = true;
  }
}, { once: true });

// ===== INPUT =====
const keys = {};
const keys2 = {}; // P2 keys
canvas.tabIndex = 1;
canvas.focus();
canvas.addEventListener("click", () => canvas.focus());
window.addEventListener("keydown", e => {
  keys[e.code] = true;
  // P2 WASD+E mapping
  if (e.code === "KeyA") keys2["left"] = true;
  if (e.code === "KeyD") keys2["right"] = true;
  if (e.code === "KeyW") keys2["up"] = true;
  if (e.code === "KeyS") keys2["down"] = true;
  if (e.code === "KeyE") keys2["item"] = true;
  e.preventDefault();
});
window.addEventListener("keyup", e => {
  keys[e.code] = false;
  if (e.code === "KeyA") keys2["left"] = false;
  if (e.code === "KeyD") keys2["right"] = false;
  if (e.code === "KeyW") keys2["up"] = false;
  if (e.code === "KeyS") keys2["down"] = false;
  if (e.code === "KeyE") keys2["item"] = false;
});
let enterPressed = false;
window.addEventListener("keydown", e => { if (e.code === "Enter") enterPressed = true; });
// Click/tap also acts as Enter on title/result screens
canvas.addEventListener("click", () => {
  if (scene === "title" || scene === "result") enterPressed = true;
});

// ===== TOUCH CONTROLS =====
function makeTouchButtons() {
  return {
    left:  { x: 20,  y: H - 90, w: 70, h: 70, key: "ArrowLeft",  label: "\u25C0", active: false },
    right: { x: 100, y: H - 90, w: 70, h: 70, key: "ArrowRight", label: "\u25B6", active: false },
    accel: { x: W - 90, y: H - 160, w: 70, h: 70, key: "ArrowUp",   label: "\u25B2", active: false },
    brake: { x: W - 90, y: H - 80,  w: 70, h: 70, key: "ArrowDown", label: "\u25BC", active: false },
    item:  { x: W/2 - 40, y: H - 90, w: 80, h: 60, key: "Space",    label: "ITEM", active: false }
  };
}

// P2 touch buttons (top half, mirrored layout)
function makeTouchButtons2() {
  return {
    left:  { x: W - 100 - 70, y: 20,  w: 70, h: 70, label: "\u25B6", active: false },
    right: { x: W - 20 - 70,  y: 20,  w: 70, h: 70, label: "\u25C0", active: false },
    accel: { x: 20,  y: 20,  w: 70, h: 70, label: "\u25BC", active: false },
    brake: { x: 20,  y: 100, w: 70, h: 70, label: "\u25B2", active: false },
    item:  { x: W/2 - 40, y: 20, w: 80, h: 60, label: "ITEM", active: false }
  };
}

let touchButtons = makeTouchButtons();
let touchButtons2 = makeTouchButtons2();

let isTouchDevice = false;
let activeTouches = {};

function canvasCoords(touch) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  return {
    x: (touch.clientX - rect.left) * scaleX,
    y: (touch.clientY - rect.top) * scaleY
  };
}

function hitTestButton(cx, cy) {
  // In 2P mode, check which half the touch is in
  if (settings.mode === 2) {
    const halfH = H / 2;
    if (cy < halfH) {
      // P2 area (top half)
      for (const name in touchButtons2) {
        const b = touchButtons2[name];
        if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
          return { player: 2, button: name };
        }
      }
      return null;
    } else {
      // P1 area (bottom half)
      for (const name in touchButtons) {
        const b = touchButtons[name];
        if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
          return { player: 1, button: name };
        }
      }
      return null;
    }
  }
  // Normal mode
  for (const name in touchButtons) {
    const b = touchButtons[name];
    if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
      return { player: 1, button: name };
    }
  }
  return null;
}

function updateTouchKeys() {
  // Reset all touch buttons
  for (const name in touchButtons) touchButtons[name].active = false;
  if (settings.mode === 2) {
    for (const name in touchButtons2) touchButtons2[name].active = false;
  }
  // Check all active touches
  for (const id in activeTouches) {
    const t = activeTouches[id];
    const result = hitTestButton(t.x, t.y);
    if (result) {
      if (result.player === 1) {
        touchButtons[result.button].active = true;
      } else if (result.player === 2) {
        touchButtons2[result.button].active = true;
      }
    }
  }
  // Update keys from touch state (only for game scene)
  if (scene === "game") {
    // P1 keys
    keys["ArrowLeft"] = touchButtons.left.active || (keys["ArrowLeft"] && !isTouchDevice);
    keys["ArrowRight"] = touchButtons.right.active || (keys["ArrowRight"] && !isTouchDevice);
    keys["ArrowUp"] = touchButtons.accel.active || (keys["ArrowUp"] && !isTouchDevice);
    keys["ArrowDown"] = touchButtons.brake.active || (keys["ArrowDown"] && !isTouchDevice);
    keys["Space"] = touchButtons.item.active || (keys["Space"] && !isTouchDevice);

    // P2 keys (2P mode touch)
    if (settings.mode === 2) {
      keys2["left"] = touchButtons2.left.active || (keys2["left"] && !isTouchDevice);
      keys2["right"] = touchButtons2.right.active || (keys2["right"] && !isTouchDevice);
      keys2["up"] = touchButtons2.accel.active || (keys2["up"] && !isTouchDevice);
      keys2["down"] = touchButtons2.down ? touchButtons2.down.active : touchButtons2.brake.active || (keys2["down"] && !isTouchDevice);
      keys2["item"] = touchButtons2.item.active || (keys2["item"] && !isTouchDevice);
    }
  }
}

function handleSettingsTouch(cx, cy) {
  // Settings items positions (matching drawSettings layout)
  const items = [
    { y: 170, h: 80 }, // MODE
    { y: 250, h: 80 }, // COURSE
    { y: 330, h: 80 }  // ITEMS
  ];
  const modeCount = modeNames.length;
  // Check if tapped on a setting item
  for (let i = 0; i < items.length; i++) {
    if (cy >= items[i].y - 20 && cy < items[i].y + items[i].h - 20) {
      settingSel = i;
      // Left half = decrease, right half = increase
      if (cx < W / 2) {
        if (i === 0) settings.mode = (settings.mode - 1 + modeCount) % modeCount;
        if (i === 1) settings.course = (settings.course - 1 + 3) % 3;
        if (i === 2) settings.items = 1 - settings.items;
      } else {
        if (i === 0) settings.mode = (settings.mode + 1) % modeCount;
        if (i === 1) settings.course = (settings.course + 1) % 3;
        if (i === 2) settings.items = 1 - settings.items;
      }
      return true;
    }
  }
  // START button area (bottom)
  if (cy >= 440) {
    enterPressed = true;
    return true;
  }
  return false;
}

canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  isTouchDevice = true;
  for (const touch of e.changedTouches) {
    const coords = canvasCoords(touch);
    activeTouches[touch.identifier] = coords;

    if (scene === "title" || scene === "result") {
      enterPressed = true;
    } else if (scene === "settings") {
      handleSettingsTouch(coords.x, coords.y);
    }
  }
  if (scene === "game") updateTouchKeys();
}, { passive: false });

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    activeTouches[touch.identifier] = canvasCoords(touch);
  }
  if (scene === "game") updateTouchKeys();
}, { passive: false });

canvas.addEventListener("touchend", e => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    delete activeTouches[touch.identifier];
  }
  if (scene === "game") {
    // Clear keys that are no longer touched
    for (const name in touchButtons) {
      touchButtons[name].active = false;
    }
    if (settings.mode === 2) {
      for (const name in touchButtons2) {
        touchButtons2[name].active = false;
      }
    }
    for (const id in activeTouches) {
      const t = activeTouches[id];
      const result = hitTestButton(t.x, t.y);
      if (result) {
        if (result.player === 1) touchButtons[result.button].active = true;
        else if (result.player === 2) touchButtons2[result.button].active = true;
      }
    }
    for (const name in touchButtons) {
      const b = touchButtons[name];
      if (!b.active) keys[b.key] = false;
    }
    if (settings.mode === 2) {
      if (!touchButtons2.left.active) keys2["left"] = false;
      if (!touchButtons2.right.active) keys2["right"] = false;
      if (!touchButtons2.accel.active) keys2["up"] = false;
      if (!touchButtons2.brake.active) keys2["down"] = false;
      if (!touchButtons2.item.active) keys2["item"] = false;
    }
  }
}, { passive: false });

canvas.addEventListener("touchcancel", e => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    delete activeTouches[touch.identifier];
  }
  if (scene === "game") {
    for (const name in touchButtons) {
      touchButtons[name].active = false;
      keys[touchButtons[name].key] = false;
    }
    if (settings.mode === 2) {
      for (const name in touchButtons2) {
        touchButtons2[name].active = false;
      }
      keys2["left"] = false; keys2["right"] = false;
      keys2["up"] = false; keys2["down"] = false;
      keys2["item"] = false;
    }
  }
}, { passive: false });

function drawTouchButtonSet(buttons, labelPrefix) {
  ctx.save();
  for (const name in buttons) {
    const b = buttons[name];
    // Button background
    ctx.fillStyle = b.active ? "rgba(255,255,255,0.45)" : "rgba(255,255,255,0.15)";
    ctx.strokeStyle = b.active ? "rgba(255,255,255,0.8)" : "rgba(255,255,255,0.4)";
    ctx.lineWidth = 2;
    const radius = 12;
    ctx.beginPath();
    ctx.moveTo(b.x + radius, b.y);
    ctx.lineTo(b.x + b.w - radius, b.y);
    ctx.quadraticCurveTo(b.x + b.w, b.y, b.x + b.w, b.y + radius);
    ctx.lineTo(b.x + b.w, b.y + b.h - radius);
    ctx.quadraticCurveTo(b.x + b.w, b.y + b.h, b.x + b.w - radius, b.y + b.h);
    ctx.lineTo(b.x + radius, b.y + b.h);
    ctx.quadraticCurveTo(b.x, b.y + b.h, b.x, b.y + b.h - radius);
    ctx.lineTo(b.x, b.y + radius);
    ctx.quadraticCurveTo(b.x, b.y, b.x + radius, b.y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Label
    ctx.fillStyle = b.active ? "rgba(255,255,255,0.95)" : "rgba(255,255,255,0.7)";
    ctx.font = name === "item" ? "bold 16px monospace" : "bold 22px monospace";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(b.label, b.x + b.w / 2, b.y + b.h / 2);
  }
  ctx.restore();
}

function drawTouchButtons() {
  if (!isTouchDevice || scene !== "game") return;
  drawTouchButtonSet(touchButtons, "P1");
  if (settings.mode === 2) {
    drawTouchButtonSet(touchButtons2, "P2");
  }
}

// ===== COURSES =====
const COURSES = {
  CITY: { name:"CITY", lapDistance:3000, roadWidth:200, maxSpeed:8, accel:0.15, friction:0.03, brake:0.20, offRoadFactor:0.95, bgColor:"#1a1a2e", roadColor:"#333333", stripeColor:"#ffcc00", sideColor:"#0f3460", cpuBaseSpeed:5.5 },
  DESERT: { name:"DESERT", lapDistance:3500, roadWidth:220, maxSpeed:9, accel:0.12, friction:0.04, brake:0.18, offRoadFactor:0.90, bgColor:"#e6c87a", roadColor:"#c4a35a", stripeColor:"#ffffff", sideColor:"#d4a853", cpuBaseSpeed:5.0 },
  SNOW: { name:"SNOW", lapDistance:2800, roadWidth:180, maxSpeed:7, accel:0.10, friction:0.05, brake:0.12, offRoadFactor:0.85, bgColor:"#d6eaf8", roadColor:"#aab7c4", stripeColor:"#ffffff", sideColor:"#eaf2f8", cpuBaseSpeed:4.5 }
};
const courseKeys = ["CITY","DESERT","SNOW"];

// ===== SCENE =====
let scene = "title";
let settings = { mode: 0, course: 0, items: 1 }; // mode: 0=time attack, 1=cpu race, 2=2p battle
let settingSel = 0;
const modeNames = ["TIME ATTACK", "CPU RACE", "2P BATTLE"];
const itemNames = ["OFF", "ON"];

// ===== GAME STATE =====
let course, player, player2, cpuCars, itemBoxes, bananas, shells;
let countdown, countdownTimer, gameTime, lapTimes, lapTimes2, raceFinished;
let sceneryObjs, stripeOffset, stripeOffset2;
let resultData;

// ===== TITLE =====
let titleScroll = 0;
let titleStars = [];
for (let i = 0; i < 60; i++) titleStars.push({ x: Math.random()*W, y: Math.random()*H, s: Math.random()*2+1 });

function updateTitle() {
  titleScroll += 2;
  if (enterPressed) { enterPressed = false; scene = "settings"; settingSel = 0; }
}

function drawTitle() {
  ctx.fillStyle = "#0a0a1a";
  ctx.fillRect(0, 0, W, H);
  // stars
  ctx.fillStyle = "#fff";
  for (const s of titleStars) {
    const y = (s.y + titleScroll * s.s * 0.3) % H;
    ctx.fillRect(s.x, y, s.s, s.s);
  }
  // road preview
  const rw = 160;
  ctx.fillStyle = "#333";
  ctx.fillRect(W/2 - rw/2, 0, rw, H);
  // stripes
  for (let i = -1; i < 15; i++) {
    const y = ((i * 40) + (titleScroll % 40));
    ctx.fillStyle = (Math.floor((titleScroll + i * 40) / 40) % 2 === 0) ? "#ff3333" : "#fff";
    ctx.fillRect(W/2 - rw/2 - 8, y, 8, 20);
    ctx.fillRect(W/2 + rw/2, y, 8, 20);
  }
  // dashes
  ctx.fillStyle = "#fff";
  for (let i = -1; i < 15; i++) {
    const y = ((i * 40) + (titleScroll % 40));
    ctx.fillRect(W/2 - 2, y, 4, 20);
  }
  // title
  ctx.save();
  ctx.shadowColor = "#ff4444";
  ctx.shadowBlur = 20;
  ctx.fillStyle = "#ff4444";
  ctx.font = "bold 48px monospace";
  ctx.textAlign = "center";
  ctx.fillText("RETRO", W/2, 140);
  ctx.fillStyle = "#ffcc00";
  ctx.shadowColor = "#ffcc00";
  ctx.fillText("GRAND PRIX", W/2, 195);
  ctx.restore();
  // car on title
  drawCarSprite(W/2, 300, "#ff2222", "#ffcc00", 0, 1.5);
  // blink text
  if (Math.floor(Date.now()/500) % 2 === 0) {
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 20px monospace";
    ctx.textAlign = "center";
    ctx.fillText("PRESS ENTER TO START", W/2, 390);
  }
  // Touch instructions
  ctx.fillStyle = "#aaa";
  ctx.font = "14px monospace";
  ctx.textAlign = "center";
  ctx.fillText("TAP TO START", W/2, 420);
  ctx.fillStyle = "#888";
  ctx.font = "12px monospace";
  ctx.fillText("\u25C0 \u25B6 Move  |  \u25B2 Accel  |  \u25BC Brake  |  ITEM Button", W/2, 445);
}

// ===== SETTINGS =====
function updateSettings() {
  const modeCount = modeNames.length;
  if (keys["ArrowUp"] && !keys._upLock) { settingSel = (settingSel - 1 + 3) % 3; keys._upLock = true; }
  if (!keys["ArrowUp"]) keys._upLock = false;
  if (keys["ArrowDown"] && !keys._downLock) { settingSel = (settingSel + 1) % 3; keys._downLock = true; }
  if (!keys["ArrowDown"]) keys._downLock = false;
  if (keys["ArrowLeft"] && !keys._leftLock) {
    if (settingSel === 0) settings.mode = (settings.mode - 1 + modeCount) % modeCount;
    if (settingSel === 1) settings.course = (settings.course - 1 + 3) % 3;
    if (settingSel === 2) settings.items = 1 - settings.items;
    keys._leftLock = true;
  }
  if (!keys["ArrowLeft"]) keys._leftLock = false;
  if (keys["ArrowRight"] && !keys._rightLock) {
    if (settingSel === 0) settings.mode = (settings.mode + 1) % modeCount;
    if (settingSel === 1) settings.course = (settings.course + 1) % 3;
    if (settingSel === 2) settings.items = 1 - settings.items;
    keys._rightLock = true;
  }
  if (!keys["ArrowRight"]) keys._rightLock = false;
  if (enterPressed) { enterPressed = false; initGame(); scene = "game"; }
}

function drawSettings() {
  ctx.fillStyle = "#0a0a2e";
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "#ffcc00";
  ctx.font = "bold 36px monospace";
  ctx.textAlign = "center";
  ctx.fillText("SETTINGS", W/2, 80);

  const items = [
    { label: "MODE", value: modeNames[settings.mode] },
    { label: "COURSE", value: courseKeys[settings.course] },
    { label: "ITEMS", value: itemNames[settings.items] }
  ];
  for (let i = 0; i < items.length; i++) {
    const y = 170 + i * 80;
    const sel = i === settingSel;
    ctx.fillStyle = sel ? "#ffcc00" : "#888";
    ctx.font = "bold 22px monospace";
    ctx.textAlign = "center";
    ctx.fillText(items[i].label, W/2, y);
    ctx.fillStyle = sel ? "#fff" : "#aaa";
    ctx.font = "bold 28px monospace";
    // arrows
    ctx.fillText("< " + items[i].value + " >", W/2, y + 35);
  }
  // course preview color
  const c = COURSES[courseKeys[settings.course]];
  ctx.fillStyle = c.roadColor;
  ctx.fillRect(W/2 - 60, 410, 120, 40);
  ctx.fillStyle = c.sideColor;
  ctx.fillRect(W/2 - 80, 410, 20, 40);
  ctx.fillRect(W/2 + 60, 410, 20, 40);

  // 2P mode info
  if (settings.mode === 2) {
    ctx.fillStyle = "#88ccff";
    ctx.font = "12px monospace";
    ctx.fillText("P1: Arrows+Space  P2: WASD+E", W/2, 395);
  }

  // START button (touch-friendly)
  ctx.fillStyle = "rgba(255,204,0,0.3)";
  ctx.fillRect(W/2 - 80, 452, 160, 28);
  ctx.strokeStyle = "#ffcc00";
  ctx.lineWidth = 1;
  ctx.strokeRect(W/2 - 80, 452, 160, 28);
  ctx.fillStyle = "#ffcc00";
  ctx.font = "bold 16px monospace";
  ctx.fillText("TAP / ENTER: START", W/2, 470);
}

// ===== GAME INIT =====
function initGame() {
  course = COURSES[courseKeys[settings.course]];
  player = {
    x: W/2, y: H - 100, speed: 0, distance: 0, lap: 0,
    item: null, slip: 0, spin: 0, spinAngle: 0,
    width: 28, height: 44, color: "#ff2222", accent: "#ffcc00",
    finished: false, finishTime: 0
  };
  lapTimes = [];
  lapTimes2 = [];
  gameTime = 0;
  raceFinished = false;
  countdown = 4; // 3,2,1,GO
  countdownTimer = 0;
  stripeOffset = 0;
  stripeOffset2 = 0;
  itemBoxes = [];
  bananas = [];
  shells = [];
  cpuCars = [];
  player2 = null;

  // Rebuild touch buttons for 2P mode (adjust P1 buttons to bottom half)
  if (settings.mode === 2) {
    const halfH = H / 2;
    touchButtons = {
      left:  { x: 20,  y: H - 90, w: 70, h: 70, key: "ArrowLeft",  label: "\u25C0", active: false },
      right: { x: 100, y: H - 90, w: 70, h: 70, key: "ArrowRight", label: "\u25B6", active: false },
      accel: { x: W - 90, y: H - 160, w: 70, h: 70, key: "ArrowUp",   label: "\u25B2", active: false },
      brake: { x: W - 90, y: H - 80,  w: 70, h: 70, key: "ArrowDown", label: "\u25BC", active: false },
      item:  { x: W/2 - 40, y: H - 90, w: 80, h: 60, key: "Space",    label: "ITEM", active: false }
    };
    touchButtons2 = makeTouchButtons2();
  } else {
    touchButtons = makeTouchButtons();
  }

  // scenery
  sceneryObjs = [];
  for (let i = 0; i < 80; i++) {
    const dist = Math.random() * course.lapDistance * 3;
    const side = Math.random() < 0.5 ? -1 : 1;
    const offset = course.roadWidth/2 + 30 + Math.random() * 100;
    sceneryObjs.push({ distance: dist, side, offset, type: Math.floor(Math.random()*3) });
  }

  // item boxes
  if (settings.items) {
    for (let lap = 0; lap < 3; lap++) {
      for (let i = 0; i < 8; i++) {
        const dist = 200 + i * (course.lapDistance / 8);
        const totalDist = lap * course.lapDistance + dist;
        itemBoxes.push({
          distance: totalDist, x: W/2 + (Math.random() - 0.5) * (course.roadWidth - 40),
          width: 24, height: 24, active: true, bobPhase: Math.random() * Math.PI * 2,
          respawnTimer: 0
        });
      }
    }
  }

  // CPU cars (only for CPU RACE mode)
  if (settings.mode === 1) {
    const colors = [["#2266ff","#88bbff"],["#22cc44","#aaffaa"],["#cc66ff","#eeccff"]];
    const skills = [0.8, 0.6, 0.4];
    for (let i = 0; i < 3; i++) {
      cpuCars.push({
        x: W/2 + (i-1)*50, speed: 0, distance: -30 * (i+1),
        lap: 0, width: 28, height: 44,
        color: colors[i][0], accent: colors[i][1],
        skill: skills[i], targetSpeed: course.cpuBaseSpeed,
        steer: 0, slip: 0, spin: 0, spinAngle: 0,
        item: null, finished: false, finishTime: 0
      });
    }
  }

  // Player 2 (only for 2P BATTLE mode)
  if (settings.mode === 2) {
    player2 = {
      x: W/2, y: H - 100, speed: 0, distance: 0, lap: 0,
      item: null, slip: 0, spin: 0, spinAngle: 0,
      width: 28, height: 44, color: "#2266ff", accent: "#88ccff",
      finished: false, finishTime: 0
    };
  }

  resultData = null;
}

// ===== CAR DRAWING =====
function drawCarSprite(cx, cy, bodyColor, accentColor, angle, scale) {
  const s = scale || 1;
  ctx.save();
  ctx.translate(cx, cy);
  if (angle) ctx.rotate(angle);
  ctx.scale(s, s);
  // body
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-12, -20, 24, 40);
  // nose
  ctx.fillRect(-8, -24, 16, 6);
  // cockpit / window
  ctx.fillStyle = accentColor;
  ctx.fillRect(-8, -12, 16, 10);
  // rear wing
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-14, 14, 28, 4);
  // tires
  ctx.fillStyle = "#111";
  ctx.fillRect(-15, -18, 4, 10);
  ctx.fillRect(11, -18, 4, 10);
  ctx.fillRect(-15, 10, 4, 10);
  ctx.fillRect(11, 10, 4, 10);
  // exhaust detail
  ctx.fillStyle = "#666";
  ctx.fillRect(-4, 18, 3, 3);
  ctx.fillRect(1, 18, 3, 3);
  ctx.restore();
}

// ===== SCENERY =====
function drawSceneryObj(sx, sy, type, courseName) {
  ctx.save();
  ctx.translate(sx, sy);
  if (courseName === "CITY") {
    if (type === 0) { // building
      ctx.fillStyle = "#1a2a4a";
      ctx.fillRect(-15, -50, 30, 50);
      ctx.fillStyle = "#ffee66";
      for (let r = 0; r < 4; r++) for (let c = 0; c < 2; c++) {
        if (Math.random() > 0.3) ctx.fillRect(-10 + c*14, -45 + r*12, 6, 6);
      }
    } else if (type === 1) { // street light
      ctx.fillStyle = "#555";
      ctx.fillRect(-2, -40, 4, 40);
      ctx.fillStyle = "#ffee88";
      ctx.fillRect(-4, -44, 8, 6);
    } else { // fire hydrant
      ctx.fillStyle = "#cc2222";
      ctx.fillRect(-4, -14, 8, 14);
      ctx.fillRect(-6, -16, 12, 4);
    }
  } else if (courseName === "DESERT") {
    if (type === 0) { // cactus
      ctx.fillStyle = "#2d8a4e";
      ctx.fillRect(-4, -35, 8, 35);
      ctx.fillRect(-14, -25, 10, 6);
      ctx.fillRect(-14, -25, 4, 15);
      ctx.fillRect(6, -20, 10, 6);
      ctx.fillRect(12, -20, 4, 12);
    } else if (type === 1) { // rock
      ctx.fillStyle = "#8b7355";
      ctx.beginPath();
      ctx.moveTo(-12, 0); ctx.lineTo(-8, -18); ctx.lineTo(4, -22);
      ctx.lineTo(14, -10); ctx.lineTo(10, 0); ctx.closePath();
      ctx.fill();
    } else { // skull (small detail)
      ctx.fillStyle = "#ddd";
      ctx.fillRect(-5, -8, 10, 8);
      ctx.fillRect(-3, -10, 6, 4);
      ctx.fillStyle = "#333";
      ctx.fillRect(-3, -5, 2, 2);
      ctx.fillRect(1, -5, 2, 2);
    }
  } else { // SNOW
    if (type === 0) { // snowman
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(0, -8, 10, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, -26, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#ff6600";
      ctx.fillRect(-1, -27, 6, 3); // nose
      ctx.fillStyle = "#111";
      ctx.fillRect(-3, -30, 2, 2);
      ctx.fillRect(1, -30, 2, 2);
    } else if (type === 1) { // pine tree
      ctx.fillStyle = "#5b3a1a";
      ctx.fillRect(-3, -8, 6, 12);
      ctx.fillStyle = "#1a6a2a";
      ctx.beginPath();
      ctx.moveTo(0, -40); ctx.lineTo(-14, -8); ctx.lineTo(14, -8); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, -50); ctx.lineTo(-10, -25); ctx.lineTo(10, -25); ctx.closePath(); ctx.fill();
    } else { // ice crystal / snow pile
      ctx.fillStyle = "#e8f4f8";
      ctx.beginPath();
      ctx.moveTo(-10, 0); ctx.lineTo(0, -15); ctx.lineTo(10, 0); ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.fillRect(-8, -2, 16, 4);
    }
  }
  ctx.restore();
}

// ===== ITEM BOX =====
function drawItemBox(bx, by) {
  const t = Date.now() / 200;
  const bob = Math.sin(t) * 3;
  ctx.fillStyle = "#ffaa00";
  ctx.fillRect(bx - 12, by - 12 + bob, 24, 24);
  ctx.fillStyle = "#fff";
  ctx.font = "bold 16px monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("?", bx, by + bob);
}

function drawBanana(bx, by) {
  ctx.fillStyle = "#ffee00";
  ctx.beginPath();
  ctx.ellipse(bx, by, 8, 5, 0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = "#aa8800";
  ctx.fillRect(bx-1, by-6, 2, 4);
}

function drawShell(bx, by) {
  ctx.fillStyle = "#22cc22";
  ctx.beginPath();
  ctx.arc(bx, by, 8, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = "#116611";
  ctx.fillRect(bx-6, by-2, 12, 2);
  ctx.fillRect(bx-2, by-6, 2, 12);
}

// ===== Helper: Update a single player's physics =====
function updatePlayerPhysics(p, inputKeys, isP2) {
  if (p.finished) return;

  const leftKey = isP2 ? "left" : "ArrowLeft";
  const rightKey = isP2 ? "right" : "ArrowRight";
  const upKey = isP2 ? "up" : "ArrowUp";
  const downKey = isP2 ? "down" : "ArrowDown";
  const itemKey = isP2 ? "item" : "Space";
  const ownerTag = isP2 ? "player2" : "player";

  const onRoad = Math.abs(p.x - W/2) < course.roadWidth/2;
  if (p.slip > 0) {
    p.slip--;
    p.speed *= 0.97;
    p.x += Math.sin(p.slip * 0.5) * 3;
  } else if (p.spin > 0) {
    p.spin--;
    p.spinAngle += 0.3;
    p.speed *= 0.95;
  } else {
    if (inputKeys[leftKey]) p.x -= 4;
    if (inputKeys[rightKey]) p.x += 4;
    if (inputKeys[upKey]) p.speed = Math.min(p.speed + course.accel, course.maxSpeed);
    else if (inputKeys[downKey]) p.speed = Math.max(p.speed - course.brake, 0);
    else p.speed = Math.max(p.speed - course.friction, 0);

    if (!onRoad) p.speed *= course.offRoadFactor;
  }

  // item use
  if (inputKeys[itemKey] && p.item && p.slip === 0 && p.spin === 0) {
    if (p.item === "banana") {
      bananas.push({ distance: p.distance - 40, x: p.x, width: 16, height: 10, owner: ownerTag });
      p.item = null;
    } else if (p.item === "shell") {
      shells.push({ distance: p.distance + 60, x: p.x, speed: 10, width: 16, height: 16, owner: ownerTag });
      p.item = null;
    }
    inputKeys[itemKey] = false;
  }

  p.x = Math.max(40, Math.min(W - 40, p.x));
  p.distance += p.speed;
}

// ===== GAME UPDATE =====
function updateGame(dt) {
  // Countdown
  if (countdown > 0) {
    countdownTimer += dt;
    if (countdownTimer > 1) {
      countdownTimer = 0;
      countdown--;
    }
    return;
  }

  if (raceFinished) return;
  gameTime += dt;

  // Player 1 input
  updatePlayerPhysics(player, keys, false);

  // P1 lap check
  if (!player.finished) {
    const newLap = Math.floor(player.distance / course.lapDistance);
    if (newLap > player.lap) {
      if (player.lap > 0 || newLap === 1) {
        lapTimes.push(gameTime - lapTimes.reduce((a,b) => a+b, 0));
      }
      player.lap = newLap;
      if (player.lap >= 3) {
        player.finished = true;
        player.finishTime = gameTime;
      }
    }
  }

  // Player 2 update (2P mode)
  if (settings.mode === 2 && player2) {
    updatePlayerPhysics(player2, keys2, true);

    // P2 lap check
    if (!player2.finished) {
      const newLap2 = Math.floor(player2.distance / course.lapDistance);
      if (newLap2 > player2.lap) {
        if (player2.lap > 0 || newLap2 === 1) {
          lapTimes2.push(gameTime - lapTimes2.reduce((a,b) => a+b, 0));
        }
        player2.lap = newLap2;
        if (player2.lap >= 3) {
          player2.finished = true;
          player2.finishTime = gameTime;
        }
      }
    }

    // P1 vs P2 collision (push + slow)
    const relD12 = Math.abs(player.distance - player2.distance);
    if (relD12 < 30 && Math.abs(player.x - player2.x) < 28) {
      const pushX = Math.sign(player.x - player2.x) * 3;
      player.x += pushX;
      player2.x -= pushX;
      player.speed *= 0.92;
      player2.speed *= 0.92;
    }
  }

  // CPU update
  for (const cpu of cpuCars) {
    if (cpu.finished) continue;
    if (cpu.slip > 0) {
      cpu.slip--;
      cpu.speed *= 0.97;
      cpu.x += Math.sin(cpu.slip * 0.5) * 2;
    } else if (cpu.spin > 0) {
      cpu.spin--;
      cpu.spinAngle += 0.3;
      cpu.speed *= 0.95;
    } else {
      // rubber band
      let targetSpeed = cpu.targetSpeed;
      const gap = player.distance - cpu.distance;
      if (gap < -300) targetSpeed *= 0.92;
      else if (gap > 300) targetSpeed *= 1.08;

      // speed approach
      if (cpu.speed < targetSpeed) cpu.speed += course.accel * cpu.skill;
      else cpu.speed -= course.friction;
      cpu.speed = Math.max(0, Math.min(course.maxSpeed * 0.95, cpu.speed));

      // steering: stay on road with some weaving
      const roadCenter = W/2;
      const diff = roadCenter - cpu.x;
      cpu.steer = diff * 0.02 * cpu.skill + (Math.sin(gameTime * 2 + cpu.skill * 10) * 1.5);

      // avoid other cars
      for (const other of [...cpuCars, player]) {
        if (other === cpu) continue;
        const ddist = other.distance - cpu.distance;
        if (ddist > 0 && ddist < 80) {
          const dx = other.x - cpu.x;
          if (Math.abs(dx) < 40) cpu.steer -= Math.sign(dx) * 2;
        }
      }

      // avoid bananas
      for (const b of bananas) {
        const ddist = b.distance - cpu.distance;
        if (ddist > 0 && ddist < 100 && Math.abs(b.x - cpu.x) < 40) {
          cpu.steer -= Math.sign(b.x - cpu.x) * 3;
        }
      }

      cpu.x += cpu.steer;
      cpu.x = Math.max(W/2 - course.roadWidth/2 + 20, Math.min(W/2 + course.roadWidth/2 - 20, cpu.x));
    }

    cpu.distance += cpu.speed;
    const newLap = Math.floor(cpu.distance / course.lapDistance);
    if (newLap > cpu.lap) {
      cpu.lap = newLap;
      if (cpu.lap >= 3) {
        cpu.finished = true;
        cpu.finishTime = gameTime;
      }
    }

    // CPU item use (simple AI)
    if (cpu.item && cpu.slip === 0 && cpu.spin === 0 && Math.random() < 0.01) {
      if (cpu.item === "banana") {
        bananas.push({ distance: cpu.distance - 40, x: cpu.x, width: 16, height: 10, owner: "cpu" });
        cpu.item = null;
      } else if (cpu.item === "shell") {
        shells.push({ distance: cpu.distance + 60, x: cpu.x, speed: 10, width: 16, height: 16, owner: "cpu" });
        cpu.item = null;
      }
    }
  }

  // Shell movement
  for (const sh of shells) sh.distance += sh.speed;
  shells = shells.filter(sh => {
    const relD = sh.distance - player.distance;
    return relD > -500 && relD < 1000;
  });

  // Item box respawn
  for (const box of itemBoxes) {
    if (!box.active) {
      box.respawnTimer -= dt;
      if (box.respawnTimer <= 0) {
        box.active = true;
      }
    }
  }

  // Collision: player vs item boxes
  const allPlayers = settings.mode === 2 ? [player, player2] : [player];
  for (const box of itemBoxes) {
    if (!box.active) continue;
    for (const p of allPlayers) {
      if (!box.active) break;
      const relD = Math.abs(box.distance - p.distance);
      if (relD < 20 && Math.abs(box.x - p.x) < 24 && !p.item) {
        box.active = false;
        box.respawnTimer = 5;
        p.item = Math.random() < 0.5 ? "banana" : "shell";
      }
    }
    // cpu pickup
    for (const cpu of cpuCars) {
      if (!box.active) break;
      const rd = Math.abs(box.distance - cpu.distance);
      if (rd < 20 && Math.abs(box.x - cpu.x) < 24 && !cpu.item) {
        box.active = false;
        box.respawnTimer = 5;
        cpu.item = Math.random() < 0.5 ? "banana" : "shell";
      }
    }
  }

  // Collision: players vs banana
  bananas = bananas.filter(b => {
    for (const p of allPlayers) {
      const relD = Math.abs(b.distance - p.distance);
      const ownerTag = p === player ? "player" : "player2";
      if (relD < 18 && Math.abs(b.x - p.x) < 20 && p.slip === 0 && p.spin === 0) {
        p.slip = 60;
        p.speed *= 0.5;
        return false;
      }
    }
    for (const cpu of cpuCars) {
      const rd = Math.abs(b.distance - cpu.distance);
      if (rd < 18 && Math.abs(b.x - cpu.x) < 20 && cpu.slip === 0 && cpu.spin === 0) {
        cpu.slip = 60;
        cpu.speed *= 0.5;
        return false;
      }
    }
    return true;
  });

  // Collision: cars vs shell
  shells = shells.filter(sh => {
    for (const p of allPlayers) {
      const ownerTag = p === player ? "player" : "player2";
      const relDP = Math.abs(sh.distance - p.distance);
      if (relDP < 20 && Math.abs(sh.x - p.x) < 22 && p.spin === 0 && sh.owner !== ownerTag) {
        p.spin = 45;
        p.spinAngle = 0;
        p.speed *= 0.3;
        return false;
      }
    }
    for (const cpu of cpuCars) {
      const rd = Math.abs(sh.distance - cpu.distance);
      if (rd < 20 && Math.abs(sh.x - cpu.x) < 22 && cpu.spin === 0) {
        cpu.spin = 45;
        cpu.spinAngle = 0;
        cpu.speed *= 0.3;
        return false;
      }
    }
    return true;
  });

  // Collision: player vs CPU (push)
  for (const cpu of cpuCars) {
    const relD = Math.abs(cpu.distance - player.distance);
    if (relD < 30 && Math.abs(cpu.x - player.x) < 28) {
      const pushX = Math.sign(player.x - cpu.x) * 3;
      player.x += pushX;
      cpu.x -= pushX;
      player.speed *= 0.92;
      cpu.speed *= 0.92;
    }
  }

  // Collision: CPU vs CPU (push)
  for (let i = 0; i < cpuCars.length; i++) {
    for (let j = i+1; j < cpuCars.length; j++) {
      const a = cpuCars[i], b = cpuCars[j];
      const relD = Math.abs(a.distance - b.distance);
      if (relD < 30 && Math.abs(a.x - b.x) < 28) {
        const pushX = Math.sign(a.x - b.x) * 2;
        a.x += pushX;
        b.x -= pushX;
        a.speed *= 0.95;
        b.speed *= 0.95;
      }
    }
  }

  // Check race finish
  if (settings.mode === 2) {
    // 2P mode: either player finishes 3 laps => race ends
    if ((player.finished || (player2 && player2.finished)) && !raceFinished) {
      // Ensure final lap times
      if (player.finished && lapTimes.length < 3) {
        lapTimes.push(gameTime - lapTimes.reduce((a,b) => a+b, 0));
      }
      if (player2 && player2.finished && lapTimes2.length < 3) {
        lapTimes2.push(gameTime - lapTimes2.reduce((a,b) => a+b, 0));
      }
      // Determine winner
      let winner = "";
      if (player.finished && (!player2 || !player2.finished)) winner = "P1";
      else if (!player.finished && player2 && player2.finished) winner = "P2";
      else if (player.finished && player2 && player2.finished) {
        winner = player.finishTime <= player2.finishTime ? "P1" : "P2";
      }
      resultData = {
        lapTimes, lapTimes2,
        totalTime: player.finished ? player.finishTime : gameTime,
        totalTime2: player2 && player2.finished ? player2.finishTime : gameTime,
        winner, position: 0
      };
      raceFinished = true;
    }
  } else {
    const allCars = [player, ...cpuCars];
    if (player.finished && !raceFinished) {
      // Ensure final lap time
      if (lapTimes.length < 3) {
        lapTimes.push(gameTime - lapTimes.reduce((a,b) => a+b, 0));
      }
      // Calculate position
      let position = 1;
      if (settings.mode === 1) {
        for (const cpu of cpuCars) {
          if (cpu.finished && cpu.finishTime < player.finishTime) position++;
          else if (!cpu.finished && cpu.distance > player.distance) position++;
        }
      }
      resultData = { lapTimes, totalTime: player.finishTime, position };
      raceFinished = true;
    }
  }

  stripeOffset = (player.distance * 2) % 40;
  if (player2) stripeOffset2 = (player2.distance * 2) % 40;
}

// ===== GAME DRAW (single player view) =====
function drawGameView(viewPlayer, otherEntities, viewY, viewH, playerLabel) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, viewY, W, viewH);
  ctx.clip();

  // Background
  ctx.fillStyle = course.bgColor;
  ctx.fillRect(0, viewY, W, viewH);

  const localH = viewH;
  const baseY = viewY + localH - 80; // player car position from bottom of this view
  const currentStripeOffset = (viewPlayer.distance * 2) % 40;

  // Road
  const rw = course.roadWidth;
  const roadL = W/2 - rw/2;
  const roadR = W/2 + rw/2;
  ctx.fillStyle = course.roadColor;
  ctx.fillRect(roadL, viewY, rw, viewH);

  // Side strips
  for (let i = -1; i < Math.ceil(viewH / 40) + 2; i++) {
    const y = viewY + (i * 40) - currentStripeOffset;
    if (y < viewY - 40 || y > viewY + viewH + 20) continue;
    const ci = Math.floor((viewPlayer.distance / 20 + i) % 2);
    ctx.fillStyle = ci === 0 ? course.stripeColor : "#ffffff";
    ctx.fillRect(roadL - 8, y, 8, 20);
    ctx.fillRect(roadR, y, 8, 20);
  }

  // Dash lines
  ctx.fillStyle = "#ffffff88";
  for (let i = -1; i < Math.ceil(viewH / 40) + 2; i++) {
    const y = viewY + (i * 40) - currentStripeOffset;
    if (y < viewY - 40 || y > viewY + viewH + 20) continue;
    ctx.fillRect(W/2 - 1, y, 2, 18);
  }

  // Start/finish line
  for (let lap = 0; lap <= 3; lap++) {
    const fd = lap * course.lapDistance - viewPlayer.distance;
    const screenY = baseY - fd * 2;
    if (screenY > viewY - 10 && screenY < viewY + viewH) {
      ctx.fillStyle = "#fff";
      for (let ci = 0; ci < rw/10; ci++) {
        for (let ri = 0; ri < 2; ri++) {
          if ((ci + ri) % 2 === 0) {
            ctx.fillRect(roadL + ci * 10, screenY + ri * 5, 10, 5);
          }
        }
      }
    }
  }

  // Scenery objects
  for (const obj of sceneryObjs) {
    let objDist = obj.distance % course.lapDistance;
    let relDist = objDist - (viewPlayer.distance % course.lapDistance);
    if (relDist > course.lapDistance / 2) relDist -= course.lapDistance;
    if (relDist < -course.lapDistance / 2) relDist += course.lapDistance;
    const screenY = baseY - relDist * 2;
    if (screenY < viewY - 60 || screenY > viewY + viewH + 20) continue;
    const sx = obj.side > 0 ? roadR + 10 + obj.offset : roadL - 10 - obj.offset;
    drawSceneryObj(sx, screenY, obj.type, course.name);
  }

  // Item boxes
  for (const box of itemBoxes) {
    if (!box.active) continue;
    const relD = box.distance - viewPlayer.distance;
    const screenY = baseY - relD * 2;
    if (screenY < viewY - 20 || screenY > viewY + viewH + 20) continue;
    drawItemBox(box.x, screenY);
  }

  // Bananas
  for (const b of bananas) {
    const relD = b.distance - viewPlayer.distance;
    const screenY = baseY - relD * 2;
    if (screenY < viewY - 20 || screenY > viewY + viewH + 20) continue;
    drawBanana(b.x, screenY);
  }

  // Shells
  for (const sh of shells) {
    const relD = sh.distance - viewPlayer.distance;
    const screenY = baseY - relD * 2;
    if (screenY < viewY - 20 || screenY > viewY + viewH + 20) continue;
    drawShell(sh.x, screenY);
  }

  // Draw other entities (other player, CPU cars) relative to this view
  for (const ent of otherEntities) {
    const relD = ent.distance - viewPlayer.distance;
    const screenY = baseY - relD * 2;
    if (screenY < viewY - 40 || screenY > viewY + viewH + 40) continue;
    let angle = 0;
    if (ent.spin > 0) angle = ent.spinAngle;
    let cx = ent.x;
    if (ent.slip > 0) cx += Math.sin(ent.slip * 0.5) * 3;
    drawCarSprite(cx, screenY, ent.color, ent.accent, angle, 1);
  }

  // Draw the view's own player car
  {
    let angle = 0;
    if (viewPlayer.spin > 0) angle = viewPlayer.spinAngle;
    let px = viewPlayer.x;
    if (viewPlayer.slip > 0) px += Math.sin(viewPlayer.slip * 0.5) * 4;
    drawCarSprite(px, baseY, viewPlayer.color, viewPlayer.accent, angle, 1);
    // exhaust particles when accelerating
    if (viewPlayer.speed > 2 && viewPlayer.spin === 0) {
      ctx.fillStyle = "#aaa";
      for (let i = 0; i < 3; i++) {
        const ex = px + (Math.random()-0.5)*8;
        const ey = baseY + 24 + Math.random() * 8;
        ctx.fillRect(ex, ey, 3, 3);
      }
    }
  }

  // HUD for this view
  const hudY = viewY;
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0, hudY, W, 30);
  ctx.fillStyle = "#fff";
  ctx.font = "bold 13px monospace";
  ctx.textAlign = "left";
  const currentLap = Math.min(viewPlayer.lap + 1, 3);
  ctx.fillStyle = playerLabel === "P1" ? "#ff6666" : "#6688ff";
  ctx.fillText(playerLabel, 8, hudY + 20);
  ctx.fillStyle = "#fff";
  ctx.fillText(" LAP " + currentLap + "/3", 30, hudY + 20);
  ctx.textAlign = "center";
  ctx.fillText("TIME " + formatTime(gameTime), W/2, hudY + 20);
  ctx.textAlign = "right";
  ctx.fillText(Math.floor(viewPlayer.speed * 30) + " km/h", W - 8, hudY + 20);

  // Item display
  if (viewPlayer.item) {
    ctx.fillStyle = "#ffcc00";
    ctx.font = "bold 11px monospace";
    ctx.textAlign = "left";
    ctx.fillText("ITEM:" + viewPlayer.item.toUpperCase(), 8, hudY + 30 + 14);
  }

  ctx.restore();
}

function drawGame() {
  if (settings.mode === 2 && player2) {
    // ===== 2P SPLIT SCREEN =====
    const halfH = Math.floor(H / 2);

    // P2 view (top half) - P2's perspective
    const p2Entities = [player]; // P2 sees P1
    drawGameView(player2, p2Entities, 0, halfH, "P2");

    // P1 view (bottom half) - P1's perspective
    const p1Entities = [player2]; // P1 sees P2
    drawGameView(player, p1Entities, halfH, halfH, "P1");

    // Divider line
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    ctx.fillRect(0, halfH - 1, W, 2);

    // Countdown (centered on screen, over divider)
    if (countdown > 0) {
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = countdown === 1 ? "#ffcc00" : "#fff";
      ctx.font = "bold 80px monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const txt = countdown > 1 ? (countdown - 1).toString() : "GO!";
      const scale = 1 + countdownTimer * 0.3;
      ctx.save();
      ctx.translate(W/2, H/2);
      ctx.scale(scale, scale);
      ctx.fillText(txt, 0, 0);
      ctx.restore();
      ctx.textBaseline = "alphabetic";
    }

    // Race finished overlay
    if (raceFinished && !enterPressed) {
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#ffcc00";
      ctx.font = "bold 48px monospace";
      ctx.textAlign = "center";
      ctx.fillText("FINISH!", W/2, H/2 - 20);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 20px monospace";
      ctx.fillText("PRESS ENTER FOR RESULTS", W/2, H/2 + 30);
    }

    // Draw touch buttons on top
    drawTouchButtons();
    return;
  }

  // ===== Normal (1P) draw =====
  // Background
  ctx.fillStyle = course.bgColor;
  ctx.fillRect(0, 0, W, H);

  // Road
  const rw = course.roadWidth;
  const roadL = W/2 - rw/2;
  const roadR = W/2 + rw/2;
  ctx.fillStyle = course.roadColor;
  ctx.fillRect(roadL, 0, rw, H);

  // Side strips
  for (let i = -1; i < 14; i++) {
    const y = (i * 40) - stripeOffset;
    const ci = Math.floor((player.distance / 20 + i) % 2);
    ctx.fillStyle = ci === 0 ? course.stripeColor : "#ffffff";
    ctx.fillRect(roadL - 8, y, 8, 20);
    ctx.fillRect(roadR, y, 8, 20);
  }

  // Dash lines
  ctx.fillStyle = "#ffffff88";
  for (let i = -1; i < 14; i++) {
    const y = (i * 40) - stripeOffset;
    ctx.fillRect(W/2 - 1, y, 2, 18);
  }

  // Start/finish line
  for (let lap = 0; lap <= 3; lap++) {
    const fd = lap * course.lapDistance - player.distance;
    const screenY = H - 100 - fd * 2;
    if (screenY > -10 && screenY < H) {
      ctx.fillStyle = "#fff";
      for (let ci = 0; ci < rw/10; ci++) {
        for (let ri = 0; ri < 2; ri++) {
          if ((ci + ri) % 2 === 0) {
            ctx.fillRect(roadL + ci * 10, screenY + ri * 5, 10, 5);
          }
        }
      }
    }
  }

  // Scenery objects
  for (const obj of sceneryObjs) {
    let objDist = obj.distance % course.lapDistance;
    let relDist = objDist - (player.distance % course.lapDistance);
    if (relDist > course.lapDistance / 2) relDist -= course.lapDistance;
    if (relDist < -course.lapDistance / 2) relDist += course.lapDistance;
    const screenY = H - 100 - relDist * 2;
    if (screenY < -60 || screenY > H + 20) continue;
    const sx = obj.side > 0 ? roadR + 10 + obj.offset : roadL - 10 - obj.offset;
    drawSceneryObj(sx, screenY, obj.type, course.name);
  }

  // Item boxes
  for (const box of itemBoxes) {
    if (!box.active) continue;
    const relD = box.distance - player.distance;
    const screenY = H - 100 - relD * 2;
    if (screenY < -20 || screenY > H + 20) continue;
    drawItemBox(box.x, screenY);
  }

  // Bananas
  for (const b of bananas) {
    const relD = b.distance - player.distance;
    const screenY = H - 100 - relD * 2;
    if (screenY < -20 || screenY > H + 20) continue;
    drawBanana(b.x, screenY);
  }

  // Shells
  for (const sh of shells) {
    const relD = sh.distance - player.distance;
    const screenY = H - 100 - relD * 2;
    if (screenY < -20 || screenY > H + 20) continue;
    drawShell(sh.x, screenY);
  }

  // CPU cars
  for (const cpu of cpuCars) {
    const relD = cpu.distance - player.distance;
    const screenY = H - 100 - relD * 2;
    if (screenY < -40 || screenY > H + 40) continue;
    let angle = 0;
    if (cpu.spin > 0) angle = cpu.spinAngle;
    let cx = cpu.x;
    if (cpu.slip > 0) cx += Math.sin(cpu.slip * 0.5) * 3;
    drawCarSprite(cx, screenY, cpu.color, cpu.accent, angle, 1);
  }

  // Player car
  {
    let angle = 0;
    if (player.spin > 0) angle = player.spinAngle;
    let px = player.x;
    if (player.slip > 0) px += Math.sin(player.slip * 0.5) * 4;
    drawCarSprite(px, player.y, player.color, player.accent, angle, 1);
    // exhaust particles when accelerating
    if (player.speed > 2 && player.spin === 0) {
      ctx.fillStyle = "#aaa";
      for (let i = 0; i < 3; i++) {
        const ex = px + (Math.random()-0.5)*8;
        const ey = player.y + 24 + Math.random() * 8;
        ctx.fillRect(ex, ey, 3, 3);
      }
    }
  }

  // HUD top
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0, 0, W, 36);
  ctx.fillStyle = "#fff";
  ctx.font = "bold 16px monospace";
  ctx.textAlign = "left";
  const currentLap = Math.min(player.lap + 1, 3);
  ctx.fillText("LAP " + currentLap + "/3", 15, 24);
  ctx.textAlign = "center";
  ctx.fillText("TIME " + formatTime(gameTime), W/2, 24);
  ctx.textAlign = "right";
  ctx.fillText(Math.floor(player.speed * 30) + " km/h", W - 15, 24);

  // HUD bottom (only show on non-touch or adjust for touch)
  if (!isTouchDevice) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, H - 32, W, 32);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 14px monospace";
    ctx.textAlign = "left";
    if (player.item) {
      ctx.fillStyle = "#ffcc00";
      ctx.fillText("ITEM: " + player.item.toUpperCase(), 15, H - 12);
    } else {
      ctx.fillStyle = "#666";
      ctx.fillText("ITEM: ---", 15, H - 12);
    }
    if (settings.mode === 1) {
      // calculate position
      let pos = 1;
      for (const cpu of cpuCars) {
        if (cpu.distance > player.distance) pos++;
      }
      ctx.textAlign = "right";
      ctx.fillStyle = pos === 1 ? "#ffcc00" : "#fff";
      ctx.fillText(pos + getSuffix(pos) + " PLACE", W - 15, H - 12);
    }
  } else {
    // Touch mode: show item/position in top HUD area
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 36, W, 24);
    ctx.font = "bold 12px monospace";
    ctx.textAlign = "left";
    if (player.item) {
      ctx.fillStyle = "#ffcc00";
      ctx.fillText("ITEM: " + player.item.toUpperCase(), 15, 52);
    } else {
      ctx.fillStyle = "#666";
      ctx.fillText("ITEM: ---", 15, 52);
    }
    if (settings.mode === 1) {
      let pos = 1;
      for (const cpu of cpuCars) {
        if (cpu.distance > player.distance) pos++;
      }
      ctx.textAlign = "right";
      ctx.fillStyle = pos === 1 ? "#ffcc00" : "#fff";
      ctx.fillText(pos + getSuffix(pos) + " PLACE", W - 15, 52);
    }
  }

  // Countdown
  if (countdown > 0) {
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = countdown === 1 ? "#ffcc00" : "#fff";
    ctx.font = "bold 80px monospace";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const txt = countdown > 1 ? (countdown - 1).toString() : "GO!";
    // scale animation
    const scale = 1 + countdownTimer * 0.3;
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.scale(scale, scale);
    ctx.fillText(txt, 0, 0);
    ctx.restore();
    ctx.textBaseline = "alphabetic";
  }

  // Race finished overlay
  if (raceFinished && !enterPressed) {
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#ffcc00";
    ctx.font = "bold 48px monospace";
    ctx.textAlign = "center";
    ctx.fillText("FINISH!", W/2, H/2 - 20);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 20px monospace";
    ctx.fillText("PRESS ENTER FOR RESULTS", W/2, H/2 + 30);
  }

  // Draw touch buttons on top of everything
  drawTouchButtons();
}

function formatTime(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  const ms = Math.floor((t % 1) * 100);
  return m + ":" + String(s).padStart(2,"0") + "." + String(ms).padStart(2,"0");
}

function getSuffix(n) {
  if (n === 1) return "st";
  if (n === 2) return "nd";
  if (n === 3) return "rd";
  return "th";
}

// ===== RESULT =====
let resultEnterReady = false;
function updateResult() {
  if (!resultEnterReady) {
    resultEnterReady = true;
    return;
  }
  if (enterPressed) {
    enterPressed = false;
    scene = "title";
    resultEnterReady = false;
  }
}

function drawResult() {
  ctx.fillStyle = "#0a0a2e";
  ctx.fillRect(0, 0, W, H);

  if (settings.mode === 2 && resultData) {
    // 2P BATTLE results
    ctx.fillStyle = "#ffcc00";
    ctx.font = "bold 36px monospace";
    ctx.textAlign = "center";
    ctx.fillText("RESULTS", W/2, 50);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 18px monospace";
    ctx.fillText("COURSE: " + course.name, W/2, 80);

    // Winner announcement
    ctx.fillStyle = "#ffcc00";
    ctx.font = "bold 32px monospace";
    if (resultData.winner) {
      ctx.fillText(resultData.winner + " WINS!", W/2, 120);
    }

    // P1 results (left side or top)
    const colX1 = W / 4;
    const colX2 = W * 3 / 4;

    // P1
    ctx.fillStyle = "#ff6666";
    ctx.font = "bold 20px monospace";
    ctx.fillText("P1", colX1, 160);
    ctx.fillStyle = "#ccc";
    ctx.font = "16px monospace";
    for (let i = 0; i < resultData.lapTimes.length; i++) {
      ctx.fillText("LAP " + (i+1) + ": " + formatTime(resultData.lapTimes[i]), colX1, 190 + i * 28);
    }
    ctx.fillStyle = player.finished ? "#ffcc00" : "#888";
    ctx.font = "bold 18px monospace";
    ctx.fillText(player.finished ? formatTime(resultData.totalTime) : "DNF", colX1, 280);

    // P2
    ctx.fillStyle = "#6688ff";
    ctx.font = "bold 20px monospace";
    ctx.fillText("P2", colX2, 160);
    ctx.fillStyle = "#ccc";
    ctx.font = "16px monospace";
    for (let i = 0; i < resultData.lapTimes2.length; i++) {
      ctx.fillText("LAP " + (i+1) + ": " + formatTime(resultData.lapTimes2[i]), colX2, 190 + i * 28);
    }
    ctx.fillStyle = player2 && player2.finished ? "#ffcc00" : "#888";
    ctx.font = "bold 18px monospace";
    ctx.fillText(player2 && player2.finished ? formatTime(resultData.totalTime2) : "DNF", colX2, 280);

    // Cars
    drawCarSprite(colX1, 320, "#ff2222", "#ffcc00", 0, 1.2);
    drawCarSprite(colX2, 320, "#2266ff", "#88ccff", 0, 1.2);

  } else {
    // Normal result
    ctx.fillStyle = "#ffcc00";
    ctx.font = "bold 40px monospace";
    ctx.textAlign = "center";
    ctx.fillText("RESULTS", W/2, 70);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 20px monospace";
    ctx.fillText("COURSE: " + course.name, W/2, 120);

    if (resultData) {
      for (let i = 0; i < resultData.lapTimes.length; i++) {
        ctx.fillStyle = "#ccc";
        ctx.font = "18px monospace";
        ctx.fillText("LAP " + (i+1) + ": " + formatTime(resultData.lapTimes[i]), W/2, 170 + i * 35);
      }
      ctx.fillStyle = "#ffcc00";
      ctx.font = "bold 24px monospace";
      ctx.fillText("TOTAL: " + formatTime(resultData.totalTime), W/2, 300);

      if (settings.mode === 1) {
        ctx.fillStyle = resultData.position === 1 ? "#ffcc00" : "#fff";
        ctx.font = "bold 30px monospace";
        ctx.fillText(resultData.position + getSuffix(resultData.position) + " PLACE!", W/2, 360);
      }
    }
  }

  if (Math.floor(Date.now()/500) % 2 === 0) {
    ctx.fillStyle = "#888";
    ctx.font = "16px monospace";
    ctx.textAlign = "center";
    ctx.fillText("PRESS ENTER / TAP", W/2, 440);
  }
}

// ===== MAIN LOOP =====
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  switch (scene) {
    case "title":
      updateTitle();
      drawTitle();
      break;
    case "settings":
      updateSettings();
      drawSettings();
      break;
    case "game":
      updateGame(dt);
      drawGame();
      if (raceFinished && enterPressed) {
        enterPressed = false;
        scene = "result";
        resultEnterReady = false;
      }
      break;
    case "result":
      updateResult();
      drawResult();
      break;
  }

  enterPressed = false;
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
